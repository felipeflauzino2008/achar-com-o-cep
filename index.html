<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Busca de CEP Automática</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Busca de CEP</h1>
        <input type="text" id="cep" placeholder="Digite o CEP..." maxlength="9">

        <div class="resultado">
            <p><strong>Logradouro:</strong> <span id="rua">---</span></p>
            <p><strong>Bairro:</strong> <span id="bairro">---</span></p>
            <p><strong>Cidade:</strong> <span id="cidade">---</span></p>
            <p><strong>Estado:</strong> <span id="estado">---</span></p>
            <p><strong>CEP:</strong> <span id="cep_resultado">---</span></p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
